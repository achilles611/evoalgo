<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evolutionary Blob Field</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="hud">
      <button class="hud__toggle" id="hideHudButton" type="button" aria-label="Hide simulation details">
        -
      </button>
      <div class="hud__title">Evolutionary Blob Field</div>
      <div class="hud__disclaimer">
        This simulation was made for the entertainment of Shy and Oryon
      </div>
      <div class="hud__stats" id="stats"></div>
      <div class="hud__legend">
        Green = baseline
        <span class="legend legend--red">faster / shorter life</span>
        <span class="legend legend--blue">slower / longer life</span>
      </div>
    </div>
    <button class="hud__restore" id="showHudButton" type="button" aria-label="Show simulation details">
      +
    </button>

    <audio id="bgm" src="./mixkit-sleepy-cat-135.mp3" loop preload="auto"></audio>
    <canvas id="scene" aria-label="Evolution simulation"></canvas>

    <script src="./src/app.js"></script>
  </body>
</html>
